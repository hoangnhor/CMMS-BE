name: Keep Backend Awake

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 20 \
            https://cmms-be.onrender.com/api/health
